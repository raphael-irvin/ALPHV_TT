<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHV User Portal</title>
    <link rel="stylesheet" href="styles.css">
    <script src="shared.js"></script>
</head>
<body>
    
    <div class="sidebar">
        <h2 class="sidebar-title">ALPHV</h2>
        <a href="user.html" class="nav-link active">Public Dashboard</a>
        <a href="admin.html" class="nav-link">Administrator</a>
    </div>

    <div class="main-content">
        <h2 class="page-header">User Portal (Live View)</h2>
        
        <div class="admin-card">
            <table>
                <thead>
                    <!-- Headers are injected by renderSortHeaders() on each fetch -->
                    <tr id="userTableHead"></tr>
                </thead>
                <tbody id="recordTableBody">
                </tbody>
            </table>
            <!-- Pagination controls are injected here by renderPagination() -->
            <div id="paginationControls"></div>
        </div>
    </div>

    <script>
        // === STATE ===
        let currentPage = 1;
        let currentSortBy  = 'updated_at';
        let currentSortDir = 'desc';

        // Column definitions for the user portal header
        // key=null means the column is not sortable
        const USER_COLUMNS = [
            { label: 'Last Updated', key: 'updated_at' },
            { label: 'Name',         key: 'name' },
            { label: 'Shape & Color', key: null, style: 'text-align: center;' },
        ];

        // === SORT HANDLER ===
        // Called when the user clicks a sortable column header.
        // Sorting always resets to page 1 so results are consistent.
        function handleSort(newSortBy, newSortDir) {
            currentSortBy  = newSortBy;
            currentSortDir = newSortDir;
            fetchRecords(1);
        }

        // === FETCH & RENDER ===
        function fetchRecords(page) {
            currentPage = page || currentPage;

            const tbody = document.getElementById('recordTableBody');

            // Only show 'Loading...' if the table is completely empty (first load)
            if (tbody.innerHTML.trim() === '') {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #6b7280; font-style: italic;">Loading records...</td></tr>';
            }

            getRecordsFromAPI(currentPage, currentSortBy, currentSortDir).then(data => {
                tbody.innerHTML = '';

                // Re-render headers on every fetch so the sort indicator stays current
                renderSortHeaders(
                    document.getElementById('userTableHead'),
                    USER_COLUMNS,
                    currentSortBy,
                    currentSortDir,
                    handleSort
                );

                // Laravel paginate() always wraps records in a 'data' key
                const records = data.data || data;

                records.forEach(record => {
                    const row = document.createElement('tr');
                    const formattedTime = formatRecordTime(record);

                    let shapeHTML = record.shape === 'triangle'
                        ? `<div class="shape triangle" style="border-bottom-color: ${record.color};"></div>`
                        : `<div class="shape ${record.shape}" style="background-color: ${record.color};"></div>`;

                    row.innerHTML = `
                        <td>${formattedTime}</td>
                        <td>${record.name}</td>
                        <td style="text-align: center;">${shapeHTML}</td>
                    `;
                    tbody.appendChild(row);
                });

                // Render the Prev / Next controls using the metadata from the paginator
                renderPagination(
                    document.getElementById('paginationControls'),
                    data.current_page,
                    data.last_page,
                    data.total,
                    fetchRecords
                );

            }).catch(error => console.error("Error fetching data:", error));
        }

        // Initial load on page 1
        fetchRecords(1);

        // Polling: refresh the current page every 3 seconds, preserving sort state
        setInterval(() => fetchRecords(currentPage), 3000);
    </script>
</body>
</html>
