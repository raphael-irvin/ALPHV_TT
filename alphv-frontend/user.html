<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHV User Portal</title>
    <link rel="stylesheet" href="styles.css">
    <script src="shared.js"></script>
</head>
<body>
    
    <div class="sidebar">
        <h2 class="sidebar-title">ALPHV</h2>
        <a href="user.html" class="nav-link active">Public Dashboard</a>
        <a href="admin.html" class="nav-link">Administrator</a>
    </div>

    <div class="main-content">
        <h2 class="page-header">User Portal (Live View)</h2>
        
        <div class="admin-card">
            <table>
                <thead>
                    <tr>
                        <th>Last Updated</th>
                        <th>Name</th>
                        <th style="text-align: center;">Shape & Color</th>
                    </tr>
                </thead>
                <tbody id="recordTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function fetchRecords() {

            const tbody = document.getElementById('recordTableBody');
            
            // Only show 'Loading...' if the table is completely empty
            if (tbody.innerHTML.trim() === '') {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #6b7280; font-style: italic;">Loading records...</td></tr>';
            }

            getRecordsFromAPI().then(data => {
                tbody.innerHTML = ''; 

                // We use (data.data || data) to future-proof for Laravel's pagination object!
                const records = data.data || data; 

                records.forEach(record => {
                    const row = document.createElement('tr');
                    const formattedTime = formatRecordTime(record); // Using shared function!

                    let shapeHTML = record.shape === 'triangle' 
                        ? `<div class="shape triangle" style="border-bottom-color: ${record.color};"></div>`
                        : `<div class="shape ${record.shape}" style="background-color: ${record.color};"></div>`;

                    row.innerHTML = `
                        <td>${formattedTime}</td>
                        <td>${record.name}</td>
                        <td style="text-align: center;">${shapeHTML}</td>
                    `;
                    tbody.appendChild(row);
                });
            }).catch(error => console.error("Error fetching data:", error));
        }

        fetchRecords();
        setInterval(fetchRecords, 3000);
    </script>
</body>
</html>
