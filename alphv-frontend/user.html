<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHV User Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="sidebar">
        <h2>ALPHV</h2>
        <a href="user.html" class="nav-link active">Public Dashboard</a>
        <a href="admin.html" class="nav-link">Administrator</a>
    </div>

    <div class="main-content">
        <h2>User Portal (Live View)</h2>
        
        <div class="admin-card">
            <table>
                <thead>
                    <tr>
                        <th>Last Updated</th>
                        <th>Name</th>
                        <th style="text-align: center;">Shape & Color</th>
                    </tr>
                </thead>
                <tbody id="recordTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function fetchRecords() {
            fetch('http://127.0.0.1:8000/api/records')
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.getElementById('recordTableBody');
                    tableBody.innerHTML = ''; 

                    data.forEach(record => {
                        const row = document.createElement('tr');
                        const dateObj = new Date(record.updated_at || record.created_at);
                        const formattedTime = dateObj.toLocaleTimeString('en-GB') + ' ' + dateObj.toISOString().split('T')[0];

                        let shapeHTML = '';
                        if (record.shape === 'triangle') {
                            shapeHTML = `<div class="shape triangle" style="border-bottom-color: ${record.color};"></div>`;
                        } else {
                            shapeHTML = `<div class="shape ${record.shape}" style="background-color: ${record.color};"></div>`;
                        }

                        row.innerHTML = `
                            <td>${formattedTime}</td>
                            <td>${record.name}</td>
                            <td style="text-align: center;">${shapeHTML}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                })
                .catch(error => console.error("Error fetching data:", error));
        }

        fetchRecords();
        setInterval(fetchRecords, 3000);
    </script>
</body>
</html>
