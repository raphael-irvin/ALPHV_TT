<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHV User Portal</title>
    <style>
        /* Shared Layout CSS */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background-color: #f3f4f6; }
        .sidebar { width: 250px; background-color: #1f2937; color: white; display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { margin-top: 0; font-size: 24px; letter-spacing: 2px; }
        .nav-link { color: #9ca3af; text-decoration: none; padding: 10px 0; font-size: 16px; margin-bottom: 5px; }
        .nav-link:hover, .active { color: white; font-weight: bold; }
        
        /* Main Content Container */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .admin-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        
        /* Table CSS */
        table { width: 100%; text-align: left; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #e5e7eb; padding: 12px 5px; }
        th { color: #4b5563; }

        /* RESTORED SHAPE CSS */
        .shape { margin: 0 auto; }
        .square { width: 40px; height: 40px; }
        .circle { width: 40px; height: 40px; border-radius: 50%; }
        .triangle { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 40px solid; }
    </style>
</head>
<body>
    
    <div class="sidebar">
        <h2>ALPHV</h2>
        <a href="user.html" class="nav-link active">Public Dashboard</a>
        <a href="admin.html" class="nav-link">Administrator</a>
    </div>

    <div class="main-content">
        <h2>User Portal (Live View)</h2>
        
        <div class="admin-card">
            <table>
                <thead>
                    <tr>
                        <th>Last Updated</th>
                        <th>Name</th>
                        <th style="text-align: center;">Shape & Color</th>
                    </tr>
                </thead>
                <tbody id="recordTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function fetchRecords() {
            fetch('http://127.0.0.1:8000/api/records')
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.getElementById('recordTableBody');
                    tableBody.innerHTML = ''; 

                    data.forEach(record => {
                        const row = document.createElement('tr');
                        const dateObj = new Date(record.updated_at || record.created_at);
                        const formattedTime = dateObj.toLocaleTimeString('en-GB') + ' ' + dateObj.toISOString().split('T')[0];

                        let shapeHTML = '';
                        if (record.shape === 'triangle') {
                            shapeHTML = `<div class="shape triangle" style="border-bottom-color: ${record.color};"></div>`;
                        } else {
                            shapeHTML = `<div class="shape ${record.shape}" style="background-color: ${record.color};"></div>`;
                        }

                        row.innerHTML = `
                            <td>${formattedTime}</td>
                            <td>${record.name}</td>
                            <td style="text-align: center;">${shapeHTML}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                })
                .catch(error => console.error("Error fetching data:", error));
        }

        fetchRecords();
        setInterval(fetchRecords, 3000);
    </script>
</body>
</html>
