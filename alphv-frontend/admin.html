<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHV Admin Portal</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // === SECURITY CHECK: VERIFY TOKEN ON PAGE LOAD ===
        const token = localStorage.getItem('auth_token');
        if (!token) {
            // Using 'replace' instead of 'href' so the user can't hit the back button to return here
            window.location.replace('login.html'); 
        }
    </script>
</head>

<body>

    <div class="sidebar">
        <h2 class="sidebar-title">ALPHV</h2>
        <a href="user.html" class="nav-link">Public Dashboard</a>
        <a href="admin.html" class="nav-link active">Administrator</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="main-content">
        <h2>Administrator Portal</h2>
        
        <div class="admin-card">
            <h3>Add / Edit Record</h3>
            <form id="recordForm">
                <input type="hidden" id="recordId" value="">
                <label>Name:</label>
                <input type="text" id="name" required>
                <label>Shape:</label>
                <select id="shape" required>
                    <option value="triangle">Triangle</option>
                    <option value="square">Square</option>
                    <option value="circle">Circle</option>
                </select>
                <label>Color:</label>
                <select id="color" required>
                    <option value="red">Red</option>
                    <option value="blue">Blue</option>
                    <option value="green">Green</option>
                    <option value="yellow">Yellow</option>
                </select>
                <button type="submit" id="submitBtn">Save Data</button>
                <button type="button" id="cancelBtn" style="display: none; background: gray;" onclick="cancelEdit()">Cancel</button>
            </form>
            <div id="statusMessage" style="margin-top:15px; font-weight:bold;"></div>
        </div>

        <div class="admin-card">
            <h3>Manage Existing Records</h3>
            <table>
                <thead><tr><th>Name</th><th>Shape</th><th>Color</th><th>Actions</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>

        // Helper function to create headers with the token
        const getAuthHeaders = () => {
            return {
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                'Authorization': `Bearer ${token}` // The VIP Wristband
            };
        };

        // === LOGOUT LOGIC ===
        function logout() {
            // Tell the backend to destroy the token
            fetch('http://127.0.0.1:8000/api/logout', {
                method: 'POST',
                headers: getAuthHeaders()
            }).then(() => {
                localStorage.removeItem('auth_token'); // Delete local copy
                window.location.href = 'login.html'; // Kick to login
            });
        }

        // === FETCH RECORDS ===
        function fetchAdminRecords() {
            fetch('http://127.0.0.1:8000/api/records')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('adminTableBody');
                    tbody.innerHTML = ''; 
                    data.forEach(r => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${r.name}</td><td>${r.shape}</td><td>${r.color}</td>
                                <td>
                                    <button onclick="setupEdit(${r.id}, '${r.name}', '${r.shape}', '${r.color}')">Edit</button>
                                    <button onclick="deleteRecord(${r.id})" style="background: red;">Delete</button>
                                </td>
                            </tr>`;
                    });
                });
        }
        fetchAdminRecords();

        // === DELETE FUNCTION ===
        function deleteRecord(id) {
            if(!confirm("Delete this record?")) return;
            fetch(`http://127.0.0.1:8000/api/records/${id}`, {
                method: 'DELETE',
                headers: getAuthHeaders() // Must include token!
            })
            .then(res => {
                if(!res.ok) throw new Error("Unauthorized"); // THE BUG FIX
                fetchAdminRecords();
            })
            .catch(err => alert("Failed to delete. Session may have expired."));
        }

        // === FORM SUBMISSION (CREATE/UPDATE) ===
        function setupEdit(id, name, shape, color) {
            document.getElementById('recordId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('shape').value = shape;
            document.getElementById('color').value = color;
            document.getElementById('submitBtn').innerText = "Update";
            document.getElementById('cancelBtn').style.display = "inline-block";
        }

        function cancelEdit() {
            document.getElementById('recordForm').reset();
            document.getElementById('recordId').value = "";
            document.getElementById('submitBtn').innerText = "Save Data";
            document.getElementById('cancelBtn').style.display = "none";
        }

        document.getElementById('recordForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const id = document.getElementById('recordId').value;
            const payload = {
                name: document.getElementById('name').value,
                shape: document.getElementById('shape').value,
                color: document.getElementById('color').value
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `http://127.0.0.1:8000/api/records/${id}` : 'http://127.0.0.1:8000/api/records';

            fetch(url, {
                method: method,
                headers: getAuthHeaders(), // Must include token!
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) throw new Error("Unauthorized or Bad Request");
                return res.json();
            })
            .then(data => {
                const msg = document.getElementById('statusMessage');
                msg.style.color = "green";
                msg.innerText = id ? "Record updated!" : "Record saved!";
                cancelEdit();
                fetchAdminRecords();
            })
            .catch(error => {
                const msg = document.getElementById('statusMessage');
                msg.style.color = "red";
                msg.innerText = "Error: You are not authorized or session expired.";
            });
        });
    </script>
</body>
</html>
