<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHV Admin Portal</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        select, input, button { padding: 8px; font-size: 16px; }
        #statusMessage { margin-top: 15px; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <h2>Admin Portal</h2>
    
    <form id="recordForm">
        <input type="hidden" id="recordId" value="">

        <label>Name:</label>
        <input type="text" id="name" required placeholder="e.g., Albert">

        <label>Shape:</label>
        <select id="shape" required>
            <option value="triangle">Triangle</option>
            <option value="square">Square</option>
            <option value="circle">Circle</option>
        </select>

        <label>Color:</label>
        <select id="color" required>
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="yellow">Yellow</option>
        </select>

        <button type="submit" id="submitBtn">Submit Data</button>
        <button type="button" id="cancelBtn" style="display: none;" onclick="cancelEdit()">Cancel Edit</button>
    </form>

    <div id="statusMessage"></div>

    <hr style="margin-top: 50px; margin-bottom: 50px;">

    <h3>Manage Existing Records</h3>
    <table style="width: 100%; text-align: left; border-collapse: collapse;">
        <thead>
            <tr>
                <th style="border-bottom: 1px solid #ccc; padding: 5px;">Last Updated</th>
                <th style="border-bottom: 1px solid #ccc; padding: 5px;">Name</th>
                <th style="border-bottom: 1px solid #ccc; padding: 5px;">Shape</th>
                <th style="border-bottom: 1px solid #ccc; padding: 5px;">Color</th>
                <th style="border-bottom: 1px solid #ccc; padding: 5px;">Actions</th>
            </tr>
        </thead>
        <tbody id="adminTableBody">
            </tbody>
    </table>

    <script>
       // 1. FETCH AND DISPLAY RECORDS FOR ADMIN
        function fetchAdminRecords() {
            fetch('http://127.0.0.1:8000/api/records')
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.getElementById('adminTableBody');
                    tableBody.innerHTML = ''; 

                    data.forEach(record => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td style="padding: 5px;">${new Date(record.updated_at || record.created_at).toLocaleString()}</td>
                            <td style="padding: 5px;">${record.name}</td>
                            <td style="padding: 5px;">${record.shape}</td>
                            <td style="padding: 5px;">${record.color}</td>
                            <td style="padding: 5px;">
                                <button onclick="setupEdit(${record.id}, '${record.name}', '${record.shape}', '${record.color}')">Edit</button>
                                <button onclick="deleteRecord(${record.id})" style="color: red;">Delete</button>
                            </td>
                        `;
                        tableBody.appendChild(row);
                    });
                })
                .catch(error => console.error("Error fetching data:", error));
        }

        // Load records immediately when page opens
        fetchAdminRecords();

        // 2. DELETE FUNCTIONALITY
        function deleteRecord(id) {
            if(!confirm("Are you sure you want to delete this record?")) return;

            console.log(`Deleting record ID: ${id}`);
            
            fetch(`http://127.0.0.1:8000/api/records/${id}`, {
                method: 'DELETE',
            })
            .then(response => response.json())
            .then(data => {
                console.log("Delete success:", data);
                document.getElementById('statusMessage').innerText = "Record deleted!";
                fetchAdminRecords(); // Refresh the table
            })
            .catch(error => console.error("Error deleting:", error));
        }

        // 3. EDIT SETUP FUNCTIONALITY
        function setupEdit(id, name, shape, color) {
            console.log(`Setting up edit for ID: ${id}`);
            
            // Populate the form with existing data
            document.getElementById('recordId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('shape').value = shape;
            document.getElementById('color').value = color;

            // Change UI to "Edit Mode"
            document.getElementById('submitBtn').innerText = "Update Data";
            document.getElementById('cancelBtn').style.display = "inline-block";
        }

        // Cancel Edit Mode
        function cancelEdit() {
            document.getElementById('recordForm').reset();
            document.getElementById('recordId').value = "";
            document.getElementById('submitBtn').innerText = "Submit Data";
            document.getElementById('cancelBtn').style.display = "none";
        }

        // 4. SMART FORM SUBMISSION (Handles both Create and Update)
        document.getElementById('recordForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const recordId = document.getElementById('recordId').value;
            const payload = {
                name: document.getElementById('name').value,
                shape: document.getElementById('shape').value,
                color: document.getElementById('color').value
            };

            // If we have an ID, we are UPDATING (PUT). If blank, we are CREATING (POST).
            const method = recordId ? 'PUT' : 'POST';
            const url = recordId ? `http://127.0.0.1:8000/api/records/${recordId}` : 'http://127.0.0.1:8000/api/records';

            console.log(`Sending ${method} request to ${url} with payload:`, payload);

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                console.log("Success:", data);
                document.getElementById('statusMessage').style.color = "green";
                document.getElementById('statusMessage').innerText = recordId ? "Record successfully updated!" : "Record successfully saved!";
                
                cancelEdit(); // Reset form back to normal
                fetchAdminRecords(); // Refresh the admin table
            })
            .catch(error => {
                console.error("Error occurred:", error);
                document.getElementById('statusMessage').style.color = "red";
                document.getElementById('statusMessage').innerText = "Failed to connect to backend.";
            });
        });
    </script>

</body>
</html>
